<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Técnico - Bontempo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-4">
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">OS #001 - Visita Técnica</h5>
            <span class="badge bg-warning text-dark" id="statusBadge">Agendado</span>
        </div>
        <div class="card-body">
            <h6><strong>Cliente:</strong> Carlos Silva - Apto 402</h6>
            <p class="text-muted"><strong>Instruções de Fábrica:</strong> Ajuste nas dobradiças do armário da cozinha, alinhamento de frentes de gaveta e vistoria geral de acabamento.</p>
            
            <div id="registroHorarios" class="small"></div>
        </div>
    </div>

    <div id="areaBotaoIniciar">
        <button type="button" onclick="iniciarServico()" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
            📍 CONFIRMAR CHEGADA (INICIAR SERVIÇO)
        </button>
    </div>

    <div id="formularioTecnico" style="display: none;">
        <form class="card card-body shadow-sm">
            
            <div class="mb-3">
                <label class="form-label fw-bold">Alterar Status do Serviço</label>
                <select class="form-select" id="selectStatus" onchange="atualizarStatusBadge()">
                    <option value="Em Atendimento">Em Atendimento</option>
                    <option value="Concluído">Concluído</option>
                    <option value="Parcialmente Concluído">Parcialmente Concluído</option>
                    <option value="Aguardando Peça">Aguardando Peça (Assistência)</option>
                    <option value="Retorno Necessário">Retorno Necessário</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Foto do "Antes" (Problema)</label>
                <input type="file" class="form-control" accept="image/*">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Foto do "Depois" (Solução/Acabamento)</label>
                <input type="file" class="form-control" accept="image/*">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Relatório Detalhado das Atividades</label>
                <textarea class="form-control" rows="4" id="atividadesTexto" placeholder="Descreva quais ajustes foram feitos, peças trocadas ou pendências de fábrica..."></textarea>
            </div>

            <button type="button" onclick="salvarRelatorio()" class="btn btn-success w-100 py-2 fw-bold">
                💾 SALVAR RELATÓRIO E PROGRESSO
            </button>
        </form>
    </div>
</div>

<script>
    let horaInicio = "";

    function iniciarServico() {
        // Oculta o botão inicial e mostra o formulário do técnico
        document.getElementById('areaBotaoIniciar').style.display = 'none';
        document.getElementById('formularioTecnico').style.display = 'block';
        
        // Altera o badge do topo para "Em Atendimento"
        document.getElementById('statusBadge').className = "badge bg-primary";
        document.getElementById('statusBadge').innerText = "Em Atendimento";
        
        // Registra o horário de início real do celular
        horaInicio = new Date().toLocaleString('pt-BR');
        document.getElementById('registroHorarios').innerHTML = "<span class='text-success'>⏱️ <strong>Início:</strong> " + horaInicio + "</span>";
    }

    function atualizarStatusBadge() {
        let status = document.getElementById('selectStatus').value;
        let badge = document.getElementById('statusBadge');
        badge.innerText = status;

        if (status === 'Concluído') {
            badge.className = "badge bg-success";
        } else if (status === 'Em Atendimento') {
            badge.className = "badge bg-primary";
        } else {
            badge.className = "badge bg-warning text-dark";
        }
    }

    function salvarRelatorio() {
        let status = document.getElementById('selectStatus').value;
        alert("Relatório salvo com sucesso! Status atualizado para: " + status);
        
        // Se o técnico marcar como Concluído, o sistema carimba o horário de término na tela
        if (status === 'Concluído') {
            let horaTermino = new Date().toLocaleString('pt-BR');
            document.getElementById('registroHorarios').innerHTML = 
                "<span class='text-success'>⏱️ <strong>Início:</strong> " + horaInicio + "</span><br>" +
                "<span class='text-danger'>🏁 <strong>Fim:</strong> " + horaTermino + "</span>";
        }
    }
</script>

</body>
</html>
