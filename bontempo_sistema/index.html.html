<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Bontempo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }
        .btn-bontempo {
            background-color: #000000;
            color: #ffffff;
        }
        .btn-bontempo:hover {
            background-color: #2b2b2b;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="card card-login shadow-lg bg-white p-4">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark mb-1">BONTEMPO</h3>
        <p class="text-muted small">Assistência Técnica & Logística</p>
    </div>

    <div id="erroLogin" class="alert alert-danger small py-2 d-none" role="alert">
        Usuário ou senha incorretos!
    </div>

    <form id="formLogin">
        <div class="mb-3">
            <label class="form-label small fw-bold">E-mail ou Usuário</label>
            <input type="text" id="usuario" class="form-control" placeholder="exemplo@bontempo.com" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-bold">Senha de Acesso</label>
            <input type="password" id="senha" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="button" onclick="realizarLogin()" class="btn btn-bontempo w-100 py-2 fw-bold mb-3">
            ENTRAR NO SISTEMA
        </button>
        
        <div class="text-center text-muted border-top pt-2" style="font-size: 11px;">
            Acesso restrito para colaboradores autorizados.
        </div>
    </form>
</div>

<script>
    function realizarLogin() {
        let usuario = document.getElementById('usuario').value.toLowerCase().trim();
        let senha = document.getElementById('senha').value;
        let erro = document.getElementById('erroLogin');

        // LOGIN DE TESTE PARA O GESTOR
        if (usuario === 'gestor' && senha === '1234') {
            erro.classList.add('d-none');
            window.location.href = 'dashboard.html';
        } 
        // LOGIN DE TESTE PARA O TÉCNICO
        else if (usuario === 'tecnico' && senha === '1234') {
            erro.classList.add('d-none');
            window.location.href = 'tecnico.html';
        } 
        // SE ERRAR OS DADOS
        else {
            erro.classList.remove('d-none');
        }
    }
</script>

</body>
</html>
